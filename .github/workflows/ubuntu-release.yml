---
name: Build and Release - Ubuntu Noble Numbat

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on Ubuntu Noble Numbat (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ubuntu:noble
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            dpkg \
            dpkg-dev \
            lintian \
            cmake \
            gettext \
            desktop-file-utils \
            libdbusmenu-glib-dev \
            libdbusmenu-gtk3-dev \
            meson \
            ninja-build \
            valac \
            libgnome-menu-3-dev \
            libxml2-utils \
            libgtk-3-dev \
            libgee-0.8-dev \
            libbamf3-dev \
            libwnck-3-dev \
            libcanberra-dev \
            bamfdaemon \
            build-essential \
            pkg-config

      - name: Build
        run: |
          meson setup --prefix=/usr build
          meson configure build -D enable-apport=false -D production-release=true
          meson compile -C build
          meson install --destdir="$(pwd)/release_build" -C build

      - name: Package
        run: |
          ARCH=$(dpkg --print-architecture)
          MULTIARCH=$(dpkg-architecture -qDEB_HOST_MULTIARCH)
          mkdir -p dist/plank-reloaded
          cp -r release_build/* dist/plank-reloaded/
          cp -r DEBIAN dist/plank-reloaded/
          cd dist
          sed -i "s/^Architecture: .*/Architecture: ${ARCH}/" plank-reloaded/DEBIAN/control
          VERSION=$(sed -n "s/^Version: //p" plank-reloaded/DEBIAN/control)
          mv plank-reloaded/DEBIAN/changelog plank-reloaded/usr/share/doc/plank-reloaded/changelog.Debian
          mv plank-reloaded/DEBIAN/copyright plank-reloaded/usr/share/doc/plank-reloaded/
          gzip -9n plank-reloaded/usr/share/doc/plank-reloaded/changelog.Debian
          gzip -9n plank-reloaded/usr/share/man/man1/plank.1
          strip --strip-unneeded plank-reloaded/usr/bin/plank
          strip --strip-unneeded "plank-reloaded/usr/lib/${MULTIARCH}/libplank.so.1.0.0"
          find "plank-reloaded/usr/lib/${MULTIARCH}/plank/docklets/" -type f -name "*.so" -exec strip --strip-unneeded {} \;
          dpkg-deb --build plank-reloaded "plank-reloaded_${VERSION}_${ARCH}.deb"

      - name: Run Lintian
        run: |
          cd dist
          lintian plank-reloaded_*.deb || true

      - name: Verify Package
        run: |
          cd dist
          dpkg --info plank-reloaded_*.deb
          dpkg --contents plank-reloaded_*.deb

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/plank-reloaded_*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
